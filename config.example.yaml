# Copy to ~/.readless/config.yaml and fill in your key (or set the matching env
# var — env wins). First server launch auto-creates this file from defaults.

tts_provider: openai      # openai | elevenlabs

# --- OpenAI TTS ---
openai_api_key: ""        # paste sk-... here, or leave empty and use env var
voice: alloy              # alloy / echo / fable / onyx / nova / shimmer

# --- ElevenLabs TTS (used when tts_provider: elevenlabs) ---
elevenlabs_api_key: ""                        # or set ELEVENLABS_API_KEY env var
elevenlabs_voice_id: "JBFqnCBsd6RMkjVDRZzb"   # default: "George". Find IDs in the ElevenLabs voice library.
elevenlabs_model_id: "eleven_flash_v2_5"      # eleven_flash_v2_5 (fast) / eleven_multilingual_v2 (quality) / eleven_turbo_v2_5

speed: 1.1                # 1.0 - 1.3 (openai only; elevenlabs ignores)
language_hint: zh         # hint for TTS pronunciation; "en", "zh", etc.

quiet_hours:
  start: "23:00"          # speak_summary / speak_status silenced inside this window
  end: "08:00"            # speak_blocker always plays

tools:
  speak_status: true
  speak_summary: true
  speak_blocker: true

status_throttle_seconds: 60
log_path: ~/.readless/log.jsonl
