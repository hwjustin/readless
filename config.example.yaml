# Copy to ~/.readless/config.yaml. Plugin auto-creates this file on first run.
# Default (system) needs no API key — it uses your OS's built-in voice.

tts_provider: system      # system | openai | elevenlabs

# --- system: OS-native TTS, zero dependencies ---
# macOS:   uses `say`. Voices: `say -v '?'` to list. e.g. "Tingting" (zh), "Samantha" (en)
# Linux:   uses `espeak-ng` (install: apt install espeak-ng). Voice = language code.
# Windows: uses PowerShell SAPI. Voice = installed SAPI voice name.
system_voice: ""          # empty = platform default

# --- OpenAI TTS ---
openai_api_key: ""        # paste sk-... here, or set OPENAI_API_KEY env var
voice: alloy              # alloy / echo / fable / onyx / nova / shimmer

# --- ElevenLabs TTS ---
elevenlabs_api_key: ""                        # or set ELEVENLABS_API_KEY env var
elevenlabs_voice_id: "JBFqnCBsd6RMkjVDRZzb"   # default: "George"
elevenlabs_model_id: "eleven_flash_v2_5"      # eleven_flash_v2_5 / eleven_multilingual_v2 / eleven_turbo_v2_5

speed: 1.1                # 1.0 - 1.3 (openai only)
language_hint: zh         # "en", "zh", ...
summary_max_chars: 80     # max characters spoken for per-turn summary

quiet_hours:
  start: "23:00"          # per-turn summaries silenced inside this window
  end: "08:00"            # notifications (blocker pings) always play

log_path: ~/.readless/log.jsonl
